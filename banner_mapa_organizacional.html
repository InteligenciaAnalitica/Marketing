<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner Mapa Organizacional</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800&family=Asap+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: transparent; }
.banner {
  background-color: #003580;
  background-image:
    linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
  background-size: 36px 36px;
  border-bottom: 3px solid #FF9B37;
  box-shadow: 0 4px 20px rgba(0,0,0,.28);
  padding: 20px 36px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: 'Segoe UI', system-ui, Arial, sans-serif;
  width: 100%;
}
.banner-left {
  display: flex;
  align-items: center;
  gap: 22px;
}
.banner-logo {
  height: 44px;
  opacity: 0.95;
  flex-shrink: 0;
}
.banner-divider {
  width: 1px;
  height: 40px;
  background: rgba(255,255,255,0.2);
  flex-shrink: 0;
}
.banner-label {
  font-family: 'Asap Condensed', 'Segoe UI', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: #FF9B37;
  margin-bottom: 4px;
}
.banner-title {
  font-family: 'Rubik', 'Segoe UI', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: #ffffff;
  letter-spacing: -.01em;
  line-height: 1.1;
}
.banner-right {
  font-family: 'Asap Condensed', 'Segoe UI', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.38);
  text-align: right;
}
</style>
</head>
